server.port=${SERVER_PORT:8080}
server.forward-headers-strategy=${SERVER_FORWARD_HEADERS_STRATEGY:framework}

# --- DB (JDBC/Hikari) ---
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:8}
spring.datasource.hikari.data-source-properties.reWriteBatchedInserts=true

# --- Hibernate/JPA batch writes ---
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=${HIBERNATE_BATCH_SIZE:200}
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/pg
spring.flyway.validate-on-migrate=true
spring.flyway.validate-migration-naming=true
spring.flyway.baseline-on-migrate=true

# --- S3/MinIO ---
app.s3.endpoint=${S3_ENDPOINT}
app.s3.region=${S3_REGION}
app.s3.bucket=${S3_BUCKET}
app.s3.accessKey=${S3_ACCESS_KEY}
app.s3.secretKey=${S3_SECRET_KEY}
app.s3.pathStyle=${S3_PATH_STYLE:true}

# --- Ingest ---
app.ingest.sources=${ESX_SOURCES}
app.ingest.poll.cron=${POLL_CRON}
app.http.timeoutMs=${HTTP_TIMEOUT_MS:15000}
# 0 = auto (min(8, CPU)); >0 = fixed number of mapper worker threads
app.ingest.mapper.threads=${MAPPER_THREADS:0}

# --- Actuator ---
management.endpoints.web.exposure.include=health,info,metrics

# --- Github ---
app.ingest.mode=${ESX_MODE:DIRECT}
app.github.repo=${GITHUB_REPO:}
app.github.token=${GITHUB_TOKEN:}
app.github.zipTimeoutMs=${GITHUB_ZIP_TIMEOUT_MS:1800000}

# --- CORS ---
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# --- Admin auth (hashing happens on frontend, backend compares SHA-256(password)) ---
app.admin.password=${ADMIN_PASSWORD:}

# --- Query warmup ---
app.query.warmup.enabled=${APP_QUERY_WARMUP_ENABLED:true}
