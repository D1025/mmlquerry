name: mizar-stack

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: [ "127.0.0.1:5432:5432" ]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server --console-address ":9001" /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:9000:9000"   # S3 API
      - "127.0.0.1:9001:9001"   # Console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL","curl -fsS http://localhost:9000/minio/health/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb -p local/${S3_BUCKET} || true &&
      exit 0"
    restart: "no"

  app:
    build:
      context: ./mizar-stack
      dockerfile: Dockerfile
    environment:
      JAVA_OPTS: "${JAVA_OPTS:-} -Djdk.xml.maxElementDepth=4096"
      # JDBC
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      # S3 (MinIO)
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_PATH_STYLE: "true"
      # Ingest
      ESX_SOURCES: ${ESX_SOURCES}
      POLL_CRON: ${POLL_CRON}
      HTTP_TIMEOUT_MS: ${HTTP_TIMEOUT_MS}
      # Github
      ESX_MODE: ${ESX_MODE}
      GITHUB_REPO: ${GITHUB_REPO}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_ZIP_TIMEOUT_MS: ${GITHUB_ZIP_TIMEOUT_MS:-1800000}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:*,http://127.0.0.1:*,https://localhost:*,https://127.0.0.1:*,http://${LETSENCRYPT_TARGET:-${LETSENCRYPT_IP:-159.89.106.226}},https://${LETSENCRYPT_TARGET:-${LETSENCRYPT_IP:-159.89.106.226}}}
      SERVER_FORWARD_HEADERS_STRATEGY: ${SERVER_FORWARD_HEADERS_STRATEGY:-framework}
    expose:
      - "8080"
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  certbot-init:
    image: certbot/certbot:latest
    environment:
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-admin@example.com}
      LETSENCRYPT_TARGET: ${LETSENCRYPT_TARGET:-${LETSENCRYPT_IP:-159.89.106.226}}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        cert_path="/etc/letsencrypt/live/$${LETSENCRYPT_TARGET}/fullchain.pem"
        if [ -f "$${cert_path}" ]; then
          echo "Let's Encrypt certificate already exists for $${LETSENCRYPT_TARGET}."
          touch /var/www/certbot/.reload-nginx
          exit 0
        fi
        if echo "$${LETSENCRYPT_TARGET}" | grep -Eq '^[0-9]+(\.[0-9]+){3}$' || echo "$${LETSENCRYPT_TARGET}" | grep -q ':'; then
          certbot certonly \
            --non-interactive \
            --agree-tos \
            --email "$${LETSENCRYPT_EMAIL}" \
            --preferred-profile shortlived \
            --webroot \
            --webroot-path /var/www/certbot \
            --cert-name "$${LETSENCRYPT_TARGET}" \
            --ip-address "$${LETSENCRYPT_TARGET}"
        else
          certbot certonly \
            --non-interactive \
            --agree-tos \
            --email "$${LETSENCRYPT_EMAIL}" \
            --preferred-profile shortlived \
            --webroot \
            --webroot-path /var/www/certbot \
            --cert-name "$${LETSENCRYPT_TARGET}" \
            -d "$${LETSENCRYPT_TARGET}"
        fi
        touch /var/www/certbot/.reload-nginx
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      frontend:
        condition: service_started
    restart: "no"

  certbot-renew:
    image: certbot/certbot:latest
    environment:
      CERTBOT_RENEW_INTERVAL_SECONDS: ${CERTBOT_RENEW_INTERVAL_SECONDS:-43200}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        trap exit TERM
        while :; do
          certbot renew \
            --webroot \
            --webroot-path /var/www/certbot \
            --preferred-profile shortlived \
            --deploy-hook "touch /var/www/certbot/.reload-nginx"
          sleep "$${CERTBOT_RENEW_INTERVAL_SECONDS}" & wait $!
        done
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      frontend:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./mml-querry-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${FRONTEND_API_BASE_URL:-/api}
    environment:
      LETSENCRYPT_TARGET: ${LETSENCRYPT_TARGET:-${LETSENCRYPT_IP:-159.89.106.226}}
      NGINX_RELOAD_CHECK_SECONDS: ${NGINX_RELOAD_CHECK_SECONDS:-30}
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    depends_on:
      app:
        condition: service_started
    volumes:
      - letsencrypt:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot
    restart: unless-stopped

volumes:
  pgdata:
  minio-data:
  letsencrypt:
  certbot-www:
